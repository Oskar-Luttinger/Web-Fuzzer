<!DOCTYPE html>
<html>
<head>
    <title>Staff Member</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1 id="displayName">...</h1>
    <p id="userDescription">...P</p>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const userId = urlParams.get('id');

        const display = document.getElementById('displayName');
        const info = document.getElementById('userDescription');

        if (userId) {
            display.innerText = userId;
        } else {
            display.innerText = "No user selected";
        }

        if (userId === "bing-bong") {
            info.innerText = "This is the account page for Bing Bong, the most evil of evil at Evil Corp. Legend says he hasn't blinked since 2014.";
        }

        if (userId === "king-kong") {
            info.innerText = "This is the account page for King Kong. He likes potatoes and usually eats them while watching his favorite show, Gilmore Girls. \n He finds the snappy dialogue comforting.";
        }

        if (userId === "ding-dong") {
            info.innerText = "This is the account page for Ding Dong. He strictly dislikes potatoes and is currently leading the project to replace all office chairs with slightly wobbly ones.";
        }
        
        if (userId === "ping-pong") {
        info.innerText = "Executive Chief of Chaos. Ping Pong oversees all kitten-hating operations \n and spends most of his time perfecting his 'evil laugh' in the penthouse suite.";
        }

        if (userId === "birgitta-johnson") {
            info.innerText = "This is the account page for Birgitta Johnson. She is the lead developer of the 'Automatic Unsubscribe' button \n that actually just sends more emails.";
        }
    </script>
</body>
</html>
